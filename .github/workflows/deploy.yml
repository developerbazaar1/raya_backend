name: Deploy

on:
  push:
    branches: [main, staging]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Determine target
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "dir=/var/www/tryswann-production" >> $GITHUB_OUTPUT
            echo "app=tryswann-prod" >> $GITHUB_OUTPUT
            echo "branch=main" >> $GITHUB_OUTPUT
          else
            echo "dir=/var/www/tryswann-staging" >> $GITHUB_OUTPUT
            echo "app=tryswann-staging" >> $GITHUB_OUTPUT
            echo "branch=staging" >> $GITHUB_OUTPUT
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            cd ${{ steps.env.outputs.dir }}
            git fetch origin ${{ steps.env.outputs.branch }}
            git reset --hard origin/${{ steps.env.outputs.branch }}
            npm ci --omit=dev
            pm2 reload ${{ steps.env.outputs.app }} --update-env
            pm2 save
            echo "✓ Deployed ${{ steps.env.outputs.app }}"